services:
  backend:
    build:
      context: ./backend
    container_name: moex-select-backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: moex-select-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
